[ollama]
base_url = "http://localhost:11434"
timeout_secs = 120

[llamacpp]
model_dirs = []
n_gpu_layers = -1
context_length = 4096

[profiler]
poll_interval_ms = 200
sparkline_width = 60

[scoring]
enabled = true
judge_model = "llama3.2:3b"

[generation]
temperature = 0.7
top_p = 0.9
top_k = 40
max_tokens = 2048
context_length = 4096
repeat_penalty = 1.1
